<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم الآيلتس الذكية</title>

<!-- Tailwind CSS via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.4.1/tailwind.min.js"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<!-- Custom Styles -->
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

<!-- ===================== Header ===================== -->
<header class="sticky top-0 z-50 backdrop-blur-lg bg-white/80 dark:bg-slate-950/80 border-b border-slate-200 dark:border-slate-800 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 sm:w-12 sm:h-12 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/30">
          🎯
        </div>
        <div>
          <h1 class="text-lg sm:text-2xl font-extrabold text-slate-900 dark:text-white leading-tight">لوحة تحكم الآيلتس الذكية</h1>
          <p class="text-[11px] sm:text-sm text-slate-500 dark:text-slate-400">خطة تحضير شاملة لمدة 6 أسابيع — أهلاً بعودتك! 👋</p>
        </div>
      </div>
      <button id="darkModeToggle" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-lg hover:scale-110 transition-transform shrink-0">
        <span id="modeIcon">🌙</span>
      </button>
    </div>

    <!-- Progress Bar -->
    <div class="mt-4">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-xs sm:text-sm font-bold text-slate-600 dark:text-slate-300">نسبة إنجاز الخطة</span>
        <span id="progressLabel" class="text-xs sm:text-sm font-extrabold text-emerald-600 dark:text-emerald-400">0%</span>
      </div>
      <div class="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-fill h-full rounded-full bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500" style="width:0%"></div>
      </div>
      <div class="flex justify-between mt-1">
        <span id="taskCountLabel" class="text-[11px] text-slate-400 dark:text-slate-500">0 من 0 مهمة مكتملة</span>
        <button id="resetBtn" class="text-[11px] text-rose-500 hover:text-rose-600 font-semibold">إعادة تصفير الخطة 🔄</button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-12">

  <!-- ===================== Resources Hub ===================== -->
  <section>
    <div class="flex items-center gap-2 mb-5">
      <span class="text-2xl">📚</span>
      <h2 class="text-xl sm:text-2xl font-extrabold">مركز المصادر</h2>
    </div>
    <div id="resourcesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
  </section>

  <!-- ===================== Timeline ===================== -->
  <section>
    <div class="flex items-center gap-2 mb-5">
      <span class="text-2xl">🗓️</span>
      <h2 class="text-xl sm:text-2xl font-extrabold">الخطة الزمنية — 6 أسابيع</h2>
    </div>
    <div id="weeksContainer" class="space-y-4"></div>
  </section>

  <footer class="text-center text-xs text-slate-400 dark:text-slate-600 pt-6 pb-4">
    صُممت بعناية لمساعدتك على تحقيق هدفك في الآيلتس 💪 — بالتوفيق!
  </footer>
</main>

<!-- Custom JavaScript -->
<script src="script.js"></script>
</body>
</html>
